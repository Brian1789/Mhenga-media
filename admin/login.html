<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />

    <title>Sign In | Mhenga Media</title>
    <meta name="theme-color" content="#070A12" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="admin.css" />
</head>

<body>

    <div class="login-overlay" style="display:flex">
        <div class="login-card">
            <div class="login-brand">
                <img class="login-logo" src="/Assets/IMG-20260124-WA0286(5).jpg.jpeg" alt="Mhenga Media logo" />
                <h1>Mhenga Media</h1>
                <p>Admin Panel — Authorized access only</p>
            </div>
            <form id="js-login-form" autocomplete="off">
                <label for="login-user">Email</label>
                <input id="login-user" type="email" placeholder="Enter email" required />
                <label for="login-pass">Password</label>
                <div class="pass-wrap">
                    <input id="login-pass" type="password" placeholder="Enter password" required />
                    <button type="button" class="pass-toggle" id="js-pass-toggle" aria-label="Show password">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
                            viewBox="0 0 24 24">
                            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
                <p class="login-error" id="js-login-error" role="alert"></p>
                <button class="btn btn--primary btn--full" type="submit">Sign in</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
